<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - TK. Ana Yuliana</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>Inventory Engine</h1>
      <p>Sistem input barang untuk toko</p>
    </section>

    <div class="form">
      <label>Nama Pengguna</label>
      <select id="username">
        <option value="">Pilih nama</option>
      </select>

      <label>PIN</label>
      <input id="pin" type="password" inputmode="numeric" placeholder="Masukkan PIN">

      <button class="btn primary" onclick="login()">Masuk</button>
    </div>
  </main>

  <script src="js/toko.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const usernameSelect = document.getElementById("username");

    USERS.forEach(user => {
      const opt = document.createElement("option");
      opt.value = user.username;
      opt.textContent = user.name;
      usernameSelect.appendChild(opt);
    });
  </script>
</body>
</html>
