<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - TK. Ana Yuliana</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>TK. Ana Yuliana</h1>
      <p>Login Karyawan</p>
    </section>

    <div class="form">
      <label>Nama Karyawan</label>
      <select id="username">
        <option value="">Pilih nama</option>
        <option value="budhi">Budhi</option>
        <option value="karyawan1">Karyawan 1</option>
        <option value="karyawan2">Karyawan 2</option>
        <option value="karyawan3">Karyawan 3</option>
        <option value="karyawan4">Karyawan 4</option>
      </select>

      <label>PIN</label>
      <input id="pin" type="password" inputmode="numeric" placeholder="Masukkan PIN">

      <button class="btn primary" onclick="login()">Masuk</button>
    </div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
