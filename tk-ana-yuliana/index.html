  </main>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
  requireLogin();

  async function loadJumlahPerbaikan() {
    const user = getCurrentUser();
    const menuInput = document.getElementById("menuInput");
    menuInput.style.pointerEvents = "none";
    menuInput.style.opacity = "0.5";
    const res = await fetch(`${API_URL}?action=jumlahPerbaikan&petugas=${encodeURIComponent(user.name)}`);
    const data = await res.json();

    menuInput.style.pointerEvents = "auto";
    menuInput.style.opacity = "1";

    if (data.count > 0) {
      document.getElementById("tugasPerbaikanMenu").innerText =
        `Tugas Perbaikan (${data.count})`;

      Swal.fire({
        icon: "warning",
        title: "Ada tugas perbaikan",
        text: `Anda punya ${data.count} data yang harus diperbaiki dulu.`,
        confirmButtonText: "Lihat Tugas"
      }).then(() => {
        window.location.href = "tugas-perbaikan.html";
      });
    }
  }

  loadJumlahPerbaikan();
</script>
</body>
