<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tugas Perbaikan - Inventory Engine</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body class="list-v3-page">
  <main class="list-v3-shell">

    <header class="list-v3-header">
      <button type="button" onclick="openDrawer()">
        <i data-lucide="menu"></i>
      </button>
      <h2>Tugas Perbaikan</h2>
      <span></span>
    </header>

    <section class="list-v3-hero orange">
      <h1><i data-lucide="wrench"></i> Tugas Perbaikan</h1>
      <p>Perbaiki data barang yang masih ditandai.</p>
    </section>

    <div id="list" class="list">
      <div class="item">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text short"></div>
        <div class="skeleton skeleton-btn"></div>
      </div>
      <div class="item">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text short"></div>
        <div class="skeleton skeleton-btn"></div>
      </div>
      <div class="item">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text short"></div>
        <div class="skeleton skeleton-btn"></div>
      </div>
    </div>

  </main>

  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    requireLogin();
  </script>
  <script src="js/tugas-perbaikan.js"></script>
  <script>
    if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
