<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Input Barang - TK. Ana Yuliana</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <main class="container">
    <header class="topbar">
      <a href="index.html">←</a>
      <h2>Input Barang</h2>
    </header>

    <form id="barangForm" class="form">
      <label>Kode Barang / Barcode Satuan Terkecil</label>
      <div class="scan-row">
        <input id="kode" name="kode" required placeholder="Scan atau ketik kode">
        <button type="button" id="btnScan" class="btn-scan-mini">📷</button>
      </div>

      <div id="reader-kode" class="reader hidden"></div>

      <label>Nama Barang</label>
      <input id="nama" name="nama" required placeholder="Merk + nama + ukuran">


      <label>Satuan Terkecil</label>
      <select id="satuan1" name="satuan1" required>
        <option value="PCS">PCS</option>
        <option value="Bungkus">Bungkus</option>
        <option value="Botol">Botol</option>
        <option value="Sachet">Sachet</option>
        <option value="Pack">Pack</option>
      </select>

     <label id="labelHargaEcer1">Harga Ecer per PCS</label>
<input id="hargaEcer" name="hargaEcer" type="number" required placeholder="Harga ecer per PCS">

<label id="labelHargaGrosir1">Harga Grosir per PCS</label>
<input id="hargaGrosir1" name="hargaGrosir1" type="number" required placeholder="Harga grosir per PCS">

      <div id="multiWrap"></div>

      <button type="button" id="btnTambah" class="btn secondary">+ Tambah Satuan setelah PCS</button>
      <label id="labelModal">Modal per PCS</label>
      <input
           id="modal"
           name="modal"
           type="number"
           required
          placeholder="Masukkan modal per PCS">
      <button type="submit" class="btn primary">Simpan</button>
    </form>
  </main>

  <script src="js/auth.js"></script>
  <script>
    requireLogin();
  </script>
  <script src="js/config.js"></script>
  <script src="js/input.js"></script>
</body>
</html>
