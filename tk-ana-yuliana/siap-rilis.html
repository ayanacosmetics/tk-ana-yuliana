<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Export ke POS - Inventory Engine</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="list-v3-page">
  <main class="list-v3-shell">

    <header class="list-v3-header">
      <button type="button" onclick="openDrawer()">
        <i data-lucide="menu"></i>
      </button>
      <h2>Export ke POS</h2>
      <span></span>
    </header>

    <section class="list-v3-hero blue">
      <h1>Export ke POS</h1>
      <p>Buat file import untuk sistem kasir dari Data Barang.</p>
    </section>

    <section class="pos-export-panel">
      <div class="pos-export-head">
        <div>
          <h3>Platform POS</h3>
          <p>Pilih sistem kasir tujuan export.</p>
        </div>
      </div>

      <div class="pos-platform-card active">
        <div>
          <b>Kasir Pintar</b>
          <small>Export Barang, Multi Satuan, dan Harga Grosir</small>
        </div>
        <span>Aktif</span>
      </div>

      <div class="pos-export-head small-gap">
        <div>
          <h3>File yang dibuat</h3>
          <p>Pilih data yang ingin dimasukkan ke ZIP.</p>
        </div>
      </div>

      <div class="pos-option-list">
        <label class="pos-option-card selected" for="exportBarang">
          <input type="checkbox" id="exportBarang" checked>
          <div>
            <b>Barang</b>
            <small>Produk utama, harga beli, harga jual, dan stok.</small>
          </div>
          <span class="pos-check">✓</span>
        </label>

        <label class="pos-option-card selected" for="exportMulti">
          <input type="checkbox" id="exportMulti" checked>
          <div>
            <b>Multi Satuan</b>
            <small>PCS, Pack, Dus, Bal, dan satuan lain.</small>
          </div>
          <span class="pos-check">✓</span>
        </label>

        <label class="pos-option-card selected" for="exportGrosir">
          <input type="checkbox" id="exportGrosir" checked>
          <div>
            <b>Harga Grosir</b>
            <small>Harga bertingkat berdasarkan jumlah minimal.</small>
          </div>
          <span class="pos-check">✓</span>
        </label>
      </div>

      <button class="pos-export-btn" onclick="downloadExportKaspin(event)">
        Export Sekarang
      </button>
    </section>

  </main>

  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  <script src="js/sidebar.js"></script>

  <script>
    requireLogin();

    if (!can("export")) {
      Swal.fire("Akses ditolak", "Akun Anda tidak memiliki akses Export ke POS.", "error")
        .then(() => window.location.href = "index.html");
    }

    function refreshOptionState() {
      document.querySelectorAll(".pos-option-card").forEach(card => {
        const input = card.querySelector("input");
        card.classList.toggle("selected", input.checked);
      });
    }

    document.addEventListener("change", function(e) {
      if (e.target.matches(".pos-option-card input")) {
        refreshOptionState();
      }
    });

    async function downloadExportKaspin(event) {
      if (event) event.preventDefault();

      const user = getCurrentUser();
      const tokoId = user.toko || user.toko_id || user.id_toko;

      if (!tokoId) {
        Swal.fire({
          icon: "error",
          title: "Toko tidak ditemukan",
          text: "Silakan logout lalu login ulang."
        });
        return;
      }

      const barang = document.getElementById("exportBarang").checked;
      const multi = document.getElementById("exportMulti").checked;
      const grosir = document.getElementById("exportGrosir").checked;

      if (!barang && !multi && !grosir) {
        Swal.fire({
          icon: "warning",
          title: "Belum ada pilihan",
          text: "Pilih minimal satu file untuk diexport."
        });
        return;
      }

      const steps = [
        "Menghubungkan ke server",
        "Mengambil data toko",
        "Membaca data barang",
        "Membuat file import",
        "Mengemas ZIP",
        "Menyiapkan download"
      ];

      function renderSteps(activeIndex) {
        return `
          <div class="export-progress-box">
            ${steps.map((s, i) => `
              <div class="export-step ${i <= activeIndex ? "done" : ""}">
                <span>${i <= activeIndex ? "✓" : ""}</span>
                <p>${s}</p>
              </div>
            `).join("")}
          </div>
        `;
      }

      Swal.fire({
        title: "Export ke POS",
        html: renderSteps(0),
        showConfirmButton: false,
        allowOutsideClick: false,
        allowEscapeKey: false,
        didOpen: () => {
          Swal.showLoading();
        }
      });

      try {
        for (let i = 1; i < 3; i++) {
          await new Promise(resolve => setTimeout(resolve, 250));
          Swal.update({ html: renderSteps(i) });
        }

        const params = new URLSearchParams({
          toko: tokoId,
          user: user.name || user.username || "",
          role: user.role || "",
          barang: barang ? "1" : "0",
          multi: multi ? "1" : "0",
          grosir: grosir ? "1" : "0"
        });

        Swal.update({ html: renderSteps(3) });

        const response = await fetch(`/api/export-kaspin?${params.toString()}`);

        if (!response.ok) {
          let message = "Gagal membuat file export.";
          try {
            const err = await response.json();
            message = err.message || message;
          } catch (e) {}
          throw new Error(message);
        }

        Swal.update({ html: renderSteps(4) });

        const blob = await response.blob();

        Swal.update({ html: renderSteps(5) });

        let filename = "EXPORT_POS.zip";
        const disposition = response.headers.get("Content-Disposition");

        if (disposition && disposition.includes("filename=")) {
          filename = disposition
            .split("filename=")[1]
            .replace(/"/g, "")
            .trim();
        }

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);

        Swal.fire({
          icon: "success",
          title: "Export berhasil",
          text: "File ZIP mulai diunduh.",
          timer: 1600,
          showConfirmButton: false
        });

      } catch (err) {
        Swal.fire({
          icon: "error",
          title: "Export gagal",
          text: err.message || "Terjadi kesalahan saat export."
        });
      }
    }

    refreshOptionState();

    if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
