<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panel Admin - Inventory Engine</title>

  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="admin-v3-page">
  <main class="admin-v3-shell">

    <header class="admin-v3-header">
      <button type="button" onclick="openDrawer()">
        <i data-lucide="menu"></i>
      </button>
      <h2>Panel Admin</h2>
      <span></span>
    </header>

    <section class="admin-v3-hero">
      <h1><i data-lucide="shield-check"></i> Admin Center</h1>
      <p>Kelola toko, akun, dan hak akses sistem.</p>
    </section>

    <section class="admin-v3-tabs">
      <button id="menuAkun" type="button">
        <i data-lucide="users"></i>
        <span>Karyawan</span>
      </button>

      <button id="menuToko" type="button">
        <i data-lucide="store"></i>
        <span>Toko</span>
      </button>

      <button id="menuRole" type="button">
        <i data-lucide="key-round"></i>
        <span>Akses</span>
      </button>
    </section>

    <section id="content" class="admin-v3-content">
      <div class="admin-empty">
        <h3>Selamat datang 👋</h3>
        <p>Pilih menu di atas untuk mengelola sistem.</p>
      </div>
    </section>

  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin-akun.js"></script>
  <script src="js/admin-toko.js"></script>
  <script src="js/admin-role.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
