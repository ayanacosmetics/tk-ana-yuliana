<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lengkapi Modal - Inventory Engine</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="list-v3-page">
  <main class="list-v3-shell">
    <header class="list-v3-header">
      <button type="button" onclick="openDrawer()">
        <i data-lucide="menu"></i>
      </button>
      <h2>Lengkapi Modal</h2>
      <span></span>
    </header>

    <section class="list-v3-hero green">
      <h1><i data-lucide="badge-dollar-sign"></i> Lengkapi Modal</h1>
      <p>Isi modal barang yang masih kosong.</p>
    </section>

    <div style="padding: 0 15px 15px 15px;">
      <div style="display: flex; align-items: center; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #eee;">
        <div style="padding: 0 12px; color: #888; display: flex; align-items: center;">
          <i data-lucide="search" style="width: 20px; height: 20px;"></i>
        </div>
        <input type="text" id="searchInput" placeholder="Cari nama atau scan kode..." style="flex: 1; border: none; padding: 14px 0; outline: none; font-size: 15px; background: transparent;">
        <button type="button" onclick="startScannerSearch()" style="padding: 0 16px; height: 100%; border: none; background: transparent; color: #10b981; cursor: pointer; display: flex; align-items: center; border-left: 1px solid #eee;">
          <i data-lucide="scan-line" style="width: 20px; height: 20px;"></i>
        </button>
      </div>
    </div>
    
    <div id="reader-search" class="reader hidden" style="margin: 0 15px 15px 15px;"></div>

    <div id="list" class="list">
      <div class="item">Memuat barang modal kosong...</div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    requireLogin();
  </script>
  <script src="js/lengkapi-modal.js"></script>
  <script>
    if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
