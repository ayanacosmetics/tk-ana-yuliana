<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lengkapi Modal - Inventory Engine</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="list-v3-page">
  <main class="list-v3-shell">
    <header class="list-v3-header">
      <button type="button" onclick="openDrawer()">
        <i data-lucide="menu"></i>
      </button>
      <h2>Lengkapi Modal</h2>
      <span></span>
    </header>

    <section class="list-v3-hero green">
      <h1><i data-lucide="badge-dollar-sign"></i> Lengkapi Modal</h1>
      <p>Isi modal barang yang masih kosong.</p>
    </section>

    <div class="scan-row" style="padding: 10px 15px;">
      <input type="text" id="searchInput" placeholder="🔍 Cari nama atau scan kode..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px;">
      <button type="button" id="btnScanSearch" class="btn-scan-mini" onclick="startScannerSearch()" style="height: 44px; width: 44px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer;">
        <i data-lucide="scan-barcode"></i>
      </button>
    </div>
    
    <div id="reader-search" class="reader hidden" style="margin: 0 15px;"></div>

    <div id="list" class="list">
      <div class="item">Memuat barang modal kosong...</div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    requireLogin();
  </script>
  <script src="js/lengkapi-modal.js"></script>
  <script>
    if (window.lucide) lucide.createIcons();
  </script>
</body>
</html>
